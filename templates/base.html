    /* Safe system font fallbacks — page renders instantly even without Google Fonts */

      font-family: 'Bebas Neue';
      src: local('Bebas Neue'), local('BebasNeue');
    }

    :root {
      --font-display: 'Bebas Neue', 'Arial Narrow', 'Impact', sans-serif;
      --font-mono:    'DM Mono', 'Courier New', 'Consolas', monospace;
    }

    /* Default theme applied via CSS — overridden by JS on load */
    :root {
      --bg:       #0b0d10;
      --surface:  #111318;
      --surface2: #181c23;
      --surface3: #1e2330;
      --border:   #222631;

  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 32px;
      height: 56px;
      gap: 0;
    }

    .nav-brand {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--accent);
      text-decoration: none;
      text-shadow: 0 0 24px var(--accent-glow);
      margin-right: 40px;
    }

    .nav-links { display: flex; gap: 2px; flex: 1; }

    .nav-link {
      color: var(--muted2);
      text-decoration: none;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.15s, background 0.15s;
      border-radius: 2px;
    }

    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .nav-port-wrap {
      position: relative; display:flex; align-items:center;
    }
    .nav-port-select {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 5px 32px 5px 24px;
      font-family: var(--font-mono);
      font-size: 11px;
      border-radius: 1px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.15s;
      min-width: 150px;
    }
    .nav-port-select:focus { border-color: var(--accent); }
    .nav-port-select option { background: var(--surface2); }
    .nav-port-dot {
      position: absolute; left: 8px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      pointer-events: none;
      transition: background 0.2s;
    }
    .nav-port-arrow {
      position: absolute; right: 8px;
      color: var(--muted); font-size: 10px;
      pointer-events: none;
    }

    /* LAYOUT */
    .page {
      position: relative; z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    /* TYPOGRAPHY */
    .page-title {
      font-family: var(--font-display);
      font-size: 44px;
      letter-spacing: 3px;
      color: var(--accent);
      line-height: 1;
      text-shadow: 0 0 40px var(--accent-glow-soft);
    }

    .page-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    h2 {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
    }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      border-radius: 1px;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--btn-text);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    .btn-primary:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px var(--btn-hover-shadow);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted2);
      border: 1px solid var(--border2);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      letter-spacing: 1px;
      font-weight: 500;
      border-radius: 1px;
    }

    .badge-long  { background: rgba(52,211,153,0.12);  color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
    .badge-short { background: rgba(255,77,109,0.12); color: var(--red);   border: 1px solid rgba(255,77,109,0.3); }
    .badge-pos   { background: rgba(52,211,153,0.08);  color: var(--green); }
    .badge-neg   { background: rgba(255,77,109,0.08); color: var(--red);   }

    .pnl-pos { color: var(--green); }
    .pnl-neg { color: var(--red); }
    .pnl-zero { color: var(--muted2); }

    /* STAT BLOCKS */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .stat-block {
      background: var(--surface);
      padding: 20px 24px;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 1px;
      line-height: 1;
    }

    /* TABLE */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-weight: 400;
    }

    .data-table td {
      padding: 13px 16px;
      border-bottom: 1px solid rgba(34,38,49,0.7);
      color: var(--muted2);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }

    .data-table tbody tr {
      transition: background 0.12s;
    }

    .data-table tbody tr:hover td {
      background: var(--surface2);
      color: var(--text);
    }

    /* LINKS */
    a { color: inherit; text-decoration: none; }

    .link {
      color: var(--accent2);
      text-decoration: none;
      transition: color 0.15s;
    }

    .link:hover { color: var(--accent); text-decoration: underline; }

    /* TAGS */
    .tag-chip {
      display: inline-block;
      padding: 2px 8px;
      font-size: 10px;
      border-radius: 1px;
      letter-spacing: 0.5px;
      clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
    }

    .tag-with   { background: rgba(52,211,153,0.1);  color: var(--green);  border: 1px solid rgba(52,211,153,0.25); }
    .tag-against{ background: rgba(255,77,109,0.1); color: var(--red);    border: 1px solid rgba(255,77,109,0.25); }
    .tag-volume { background: rgba(0,207,255,0.1);  color: var(--accent2);border: 1px solid rgba(0,207,255,0.25); }
    .tag-exit   { background: rgba(255,179,71,0.1); color: var(--warn);   border: 1px solid rgba(255,179,71,0.25); }
    .tag-setup  { background: rgba(180,127,255,0.1);color: var(--purple); border: 1px solid rgba(180,127,255,0.25); }
    .tag-pre    { background: rgba(90,100,119,0.2); color: var(--muted2); border: 1px solid var(--border2); }
    .tag-entry  { background: rgba(90,100,119,0.2); color: var(--muted2); border: 1px solid var(--border2); }

    /* TOAST */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--accent); color: var(--btn-text);
      padding: 10px 22px;
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      z-index: 200;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      pointer-events: none;
    }

    #toast.show { transform: translateY(0); opacity: 1; }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* BREADCRUMB */
    .breadcrumb {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--muted);
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .breadcrumb a { color: var(--muted2); }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb .sep { color: var(--border2); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.4s ease both; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">TJ</a>
  <div class="nav-links">
    <a href="/"            class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Journal</a>
    <a href="/live"        class="nav-link {% if request.endpoint in ('live_trade_page','live_trade_list_legacy','live_trade_new_legacy','live_trade_view_legacy') %}active{% endif %}">Live Trade</a>
    <a href="/accounts"    class="nav-link {% if request.endpoint == 'accounts_view_manage' %}active{% endif %}">Accounts</a>
    <a href="/simulation"  class="nav-link {% if request.endpoint == 'simulation_view' %}active{% endif %}">Simulation</a>
    <a href="/analytics"    class="nav-link {% if request.endpoint == 'analytics' %}active{% endif %}">Analytics</a>
    <a href="/setups"       class="nav-link {% if request.endpoint in ('setups_view','setup_detail_view') %}active{% endif %}">Setups</a>
    <a href="/observations" class="nav-link {% if request.endpoint == 'observations_view' %}active{% endif %}">Observations</a>
    <a href="/settings"     class="nav-link {% if request.endpoint == 'settings_view' %}active{% endif %}">Settings</a>
  </div>
  <div class="nav-right">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap;">Account</span>
      <div class="nav-port-wrap">
        <span class="nav-port-dot" id="nav-port-dot"></span>
        <select id="global-account-select" class="nav-port-select" onchange="setGlobalAccount(this.value)">
          <option value="">— None —</option>
        </select>
        <span class="nav-port-arrow">▾</span>
      </div>
    </div>
    {% block nav_actions %}{% endblock %}
  </div>
</nav>

<div class="page fade-in">
  {% block content %}{% endblock %}
</div>

<div id="toast"></div>

<script>
  function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isErr ? 'var(--red)' : 'var(--accent)';
    t.style.color = isErr ? '#fff' : 'var(--btn-text)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Theme Switcher ──────────────────────────────────────────────────
  function setTheme(themeId) {
    const t = TJ_THEMES[themeId];
    if (!t) return;
    const root = document.documentElement;
    for (const [k,v] of Object.entries(t.vars)) root.style.setProperty(k, v);
    root.setAttribute('data-theme', themeId);
    localStorage.setItem('tj_theme', themeId);
    // Persist to server
    fetch('/api/settings/theme', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({theme: themeId})
    }).catch(() => {});
  }

  function getCurrentTheme() {
    return localStorage.getItem('tj_theme') || 'mint';
  }

  // ── Global Account Selector ──────────────────────────────────────────
  // Account is driven by ?account= URL param (server-side filter).
  // localStorage just remembers the last choice for convenience.
  const STORAGE_KEY = 'tj_active_account';

  // If localStorage has an account but URL doesn't, redirect to include it.
  // This ensures server-side filtering works when navigating via nav links.
  (function() {
    const params = new URLSearchParams(window.location.search);
    if (!params.has('account')) {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        params.set('account', saved);
        window.location.replace(window.location.pathname + '?' + params.toString() + window.location.hash);
        return; // stop execution, page will reload
      }
    }
  })();

  function getActiveAccount() {
    // URL param is truth; fall back to localStorage
    const params = new URLSearchParams(window.location.search);
    return params.get('account') || localStorage.getItem(STORAGE_KEY) || '';
  }

  function setGlobalAccount(id) {
    localStorage.setItem(STORAGE_KEY, id);
    updateNavLinks(id);
    // Rebuild current URL with new account param, keep other params
    const params = new URLSearchParams(window.location.search);
    if (id) {
      params.set('account', id);
    } else {
      params.delete('account');
    }
    // Navigate — server will filter accordingly
    window.location.href = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
  }

  function applyAccountUI(id) {
    const dot = document.getElementById('nav-port-dot');
    const sel = document.getElementById('global-account-select');
    if (!dot || !sel) return;
    const opt = sel.querySelector(`option[value="${id}"]`);
    const color = opt ? opt.dataset.color : '';
    dot.style.background  = color || 'var(--muted)';
    dot.style.boxShadow   = color ? `0 0 6px ${color}60` : 'none';
    sel.style.borderColor = color ? color + '80' : '';
  }

  async function loadAccountsIntoNav() {
    try {
      const res  = await fetch('/api/accounts');
      const list = await res.json();
      const sel  = document.getElementById('global-account-select');
      if (!sel) return;

      sel.innerHTML = '<option value="">— All Accounts —</option>';
      list.forEach(p => {
        const o = document.createElement('option');
        o.value = p.id;
        o.textContent = p.name;
        o.dataset.color = p.color;
        if (p.default_qty) o.dataset.defaultQty = p.default_qty;
        if (p.default_instrument) o.dataset.defaultInstrument = p.default_instrument;
        sel.appendChild(o);
      });

      // Sync to current URL param (or localStorage fallback)
      const active = getActiveAccount();
      if (active && sel.querySelector(`option[value="${active}"]`)) {
        sel.value = active;
      } else {
        sel.value = '';
        localStorage.removeItem(STORAGE_KEY);
      }

      applyAccountUI(sel.value);
      updateNavLinks(sel.value);
      document.dispatchEvent(new Event('accounts-loaded'));

    } catch(e) { /* server may not be ready */ }
  }

  function updateNavLinks(accountId) {
    document.querySelectorAll('.nav-link').forEach(a => {
      const url = new URL(a.href, window.location.origin);
      if (accountId) {
        url.searchParams.set('account', accountId);
      } else {
        url.searchParams.delete('account');
      }
      a.href = url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '');
    });
  }

  document.addEventListener('DOMContentLoaded', loadAccountsIntoNav);
</script>

<!-- FAB: Quick Observation -->
<button id="obs-fab" onclick="document.getElementById('obs-modal').classList.add('show')" style="
  position:fixed;bottom:28px;left:28px;z-index:100;width:48px;height:48px;border-radius:50%;
  background:var(--accent);color:var(--btn-text);border:none;font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px var(--accent-glow);transition:transform 0.15s,box-shadow 0.15s;
  display:flex;align-items:center;justify-content:center;font-weight:bold;
" title="Quick Observation">+</button>

<!-- Observation Modal -->
<div id="obs-modal" style="
  position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;
  align-items:center;justify-content:center;
">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:2px;
    width:520px;max-width:90vw;max-height:85vh;overflow-y:auto;padding:24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-family:var(--font-display);font-size:20px;letter-spacing:2px;color:var(--accent);">QUICK OBSERVATION</div>
      <button onclick="document.getElementById('obs-modal').classList.remove('show')"
        style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">&#10005;</button>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:14px;">
      <div style="flex:1;">
        <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Date</div>
        <input type="date" id="obs-date" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:var(--font-mono);font-size:12px;outline:none;">
      </div>
      <div style="flex:1;">
        <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Time</div>
        <input type="time" id="obs-time" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:var(--font-mono);font-size:12px;outline:none;">
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Category</div>
      <div id="obs-cat-row" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Group</div>
      <div id="obs-grp-row" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Observation</div>
      <textarea id="obs-text" placeholder="What did you notice..." style="
        width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
        font-family:var(--font-mono);font-size:12px;padding:10px 12px;resize:vertical;
        min-height:80px;outline:none;line-height:1.7;
      "></textarea>
    </div>
    <div style="margin-bottom:16px;">
      <div id="obs-thumb-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;"></div>
      <div class="images-drop-zone" id="obs-drop-zone"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="event.preventDefault();this.classList.remove('drag-over');_addObsFiles(event.dataTransfer.files)">
        <input type="file" accept="image/*" multiple id="obs-file-input"
               onchange="_addObsFiles(this.files);this.value=''"
               style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;">
        <div id="obs-file-label" style="font-size:11px;color:var(--muted);letter-spacing:0.5px;">Drop, click, or paste (⌘V) to upload</div>
      </div>
    </div>
    <div style="text-align:right;">
      <button onclick="saveQuickObs()" class="btn btn-primary">Save</button>
    </div>
  </div>
</div>

<style>
  #obs-modal { display:none; }
  #obs-modal.show { display:flex; }
  .obs-cat-btn {
    background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);
    padding:4px 10px;font-family:var(--font-mono);font-size:10px;cursor:pointer;
    transition:all 0.12s;letter-spacing:0.5px;
    clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
  }
  .obs-cat-btn:hover { background:var(--surface3);color:var(--text); }
  .obs-cat-btn.active { background:rgba(180,127,255,0.12);border-color:var(--purple);color:var(--purple); }
  .images-drop-zone {
    border:2px dashed var(--border2);border-radius:2px;padding:16px;
    text-align:center;cursor:pointer;position:relative;transition:all 0.2s;background:var(--bg);
  }
  .images-drop-zone:hover,.images-drop-zone.drag-over { border-color:var(--accent);background:rgba(79,255,176,0.03); }
</style>

<script>
// ── FAB Observation Modal ──────────────────────────────────────────────
(function initObsModal() {
  // Category — multi-select
  const cats = {{ obs_categories | tojson }};
  const row = document.getElementById('obs-cat-row');
  if (!row) return;
  let selectedCats = new Set(['general']);
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'obs-cat-btn' + (selectedCats.has(c) ? ' active' : '');
    btn.textContent = c;
    btn.type = 'button';
    btn.onclick = () => {
      if (selectedCats.has(c)) {
        selectedCats.delete(c);
        btn.classList.remove('active');
      } else {
        selectedCats.add(c);
        btn.classList.add('active');
      }
    };
    row.appendChild(btn);
  });
  window._obsGetCat = () => Array.from(selectedCats);

  // Group — multi-select (optional, can deselect all)
  const grps = {{ obs_groups | tojson }};
  const grpRow = document.getElementById('obs-grp-row');
  let selectedGrps = new Set();
  grps.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'obs-cat-btn';
    btn.textContent = g;
    btn.type = 'button';
    btn.onclick = () => {
      if (selectedGrps.has(g)) {
        selectedGrps.delete(g);
        btn.classList.remove('active');
      } else {
        selectedGrps.add(g);
        btn.classList.add('active');
      }
    };
    grpRow.appendChild(btn);
  });
  window._obsGetGrp = () => Array.from(selectedGrps);

  // Auto-fill date/time when modal opens
  const fab = document.getElementById('obs-fab');
  fab.addEventListener('click', () => {
    const now = new Date();
    document.getElementById('obs-date').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
    document.getElementById('obs-time').value = now.toTimeString().slice(0,5);
    document.getElementById('obs-text').value = '';
    document.getElementById('obs-file-label').textContent = 'Drop, click, or paste (⌘V) to upload';
    document.getElementById('obs-file-input').value = '';
    window._obsFiles = null;
    window._obsFileList = [];
    document.getElementById('obs-thumb-grid').innerHTML = '';
    // Reset category selection
    selectedCats = new Set(['general']);
    row.querySelectorAll('.obs-cat-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === 'general');
    });
    // Reset group selection
    selectedGrps = new Set();
    grpRow.querySelectorAll('.obs-cat-btn').forEach(b => b.classList.remove('active'));
  });
})();

function _addObsFiles(newFiles) {
  if (!window._obsFileList) window._obsFileList = [];
  for (const f of Array.from(newFiles)) window._obsFileList.push(f);
  window._obsFiles = window._obsFileList;
  _renderObsThumbs();
}

function _renderObsThumbs() {
  const grid = document.getElementById('obs-thumb-grid');
  grid.innerHTML = '';
  if (!window._obsFiles || !window._obsFiles.length) {
    document.getElementById('obs-file-label').textContent = 'Drop, click, or paste (⌘V) to upload';
    return;
  }
  document.getElementById('obs-file-label').textContent = window._obsFiles.length + ' file(s) selected';
  Array.from(window._obsFiles).forEach((file, idx) => {
    const div = document.createElement('div');
    div.style.cssText = 'position:relative;aspect-ratio:4/3;border-radius:2px;overflow:hidden;border:1px solid var(--border);';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    div.appendChild(img);
    const del = document.createElement('button');
    del.textContent = '✕';
    del.style.cssText = 'position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;font-size:10px;width:18px;height:18px;cursor:pointer;border-radius:2px;display:none;';
    div.addEventListener('mouseenter', () => del.style.display = 'block');
    div.addEventListener('mouseleave', () => del.style.display = 'none');
    del.addEventListener('click', () => {
      window._obsFileList = window._obsFileList.filter((f, i) => i !== idx);
      window._obsFiles = window._obsFileList.length ? window._obsFileList : null;
      _renderObsThumbs();
    });
    div.appendChild(del);
    grid.appendChild(div);
  });
}

async function saveQuickObs() {
  const date = document.getElementById('obs-date').value;
  const time = document.getElementById('obs-time').value;
  const text = document.getElementById('obs-text').value.trim();
  const category = window._obsGetCat();
  if (!text) { showToast('Write something first', true); return; }
  try {
    const obs_group = window._obsGetGrp ? window._obsGetGrp() : [];
    const res = await fetch('/api/observation', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({date, time, text, category, obs_group})
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'Save failed', true); return; }
    // Upload images if any
    if (window._obsFiles && window._obsFiles.length) {
      for (let file of Array.from(window._obsFiles)) {
        file = await compressImage(file);
        const form = new FormData();
        form.append('image', file);
        form.append('caption', file.name.replace(/\.[^.]+$/, ''));
        await fetch(`/api/observation/${data.id}/images`, {method:'POST', body:form});
      }
    }
    document.getElementById('obs-modal').classList.remove('show');
    showToast('Observation saved');
    // Reload if on observations page so new entry appears
    if (window.location.pathname === '/observations') {
      setTimeout(() => location.reload(), 300);
    }
  } catch(e) { showToast('Error saving', true); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('obs-modal')?.classList.remove('show');
});

// Paste support for observation modal (document-level so it works regardless of focus)
document.addEventListener('paste', (e) => {
  const modal = document.getElementById('obs-modal');
  if (!modal || !modal.classList.contains('show')) return;
  const items = e.clipboardData?.items;
  if (!items) return;
  let file = null;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      if (blob) {
        const ts = new Date().toISOString().slice(0, 19).replace('T', ' ');
        file = new File([blob], `Screenshot ${ts}.png`, { type: blob.type });
      }
      break;
    }
  }
  if (!file) return;
  e.preventDefault();
  e.stopImmediatePropagation();
  // Accumulate pasted files
  if (!window._obsFileList) window._obsFileList = [];
  window._obsFileList.push(file);
  window._obsFiles = window._obsFileList;
  _renderObsThumbs();
  // Brief green flash on drop zone
  const zone = document.getElementById('obs-drop-zone');
  zone.classList.add('drag-over');
  setTimeout(() => zone.classList.remove('drag-over'), 400);
});
</script>

<!-- Shared image utilities (compression + clipboard) -->
<script>
async function compressImage(file, quality = 0.7, maxDim = 1920) {
  if (file.size < 100 * 1024) return file;
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        const scale = maxDim / Math.max(w, h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        resolve(new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type: 'image/jpeg' }));
      }, 'image/jpeg', quality);
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(file);
  });
}

function clipboardToFile(e) {
  const items = e.clipboardData?.items;
  if (!items) return null;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      const ts = new Date().toISOString().slice(0, 19).replace('T', ' ');
      return new File([blob], `Screenshot ${ts}.png`, { type: blob.type });
    }
  }
  return null;
}
</script>
