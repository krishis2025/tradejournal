<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-overlay: rgba(10, 12, 16, 0.98);
            --card-bg: #1a1d23;
            --green: #00ff88;
            --orange: #ff9800;
            --red: #ff4d4d;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #000; }

        /* Full Screen Friction Overlay */
        .friction-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-overlay);
            backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .guard-card {
            width: 480px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h2 { font-weight: 300; letter-spacing: 2px; color: #fff; margin: 0 0 10px 0; text-transform: uppercase; }
        .sub-text { color: #666; font-size: 0.85rem; margin-bottom: 30px; line-height: 1.4; }

        .btn-stack { display: flex; flex-direction: column; gap: 15px; }

        .guard-btn {
            padding: 22px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Hover Transitions */
        .guard-btn.strength:hover { border-color: var(--green); color: var(--green); background: rgba(0, 255, 136, 0.05); }
        .guard-btn.feel:hover { border-color: var(--orange); color: var(--orange); background: rgba(255, 152, 0, 0.05); }
        .guard-btn.eager:hover { border-color: var(--red); color: var(--red); background: rgba(255, 77, 77, 0.05); }

        /* Consequence Display */
        .consequence-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid transparent;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        #consequence-msg { font-size: 0.9rem; font-weight: 500; color: #555; text-align: center; }

        /* Dynamic Visual Effects */
        .pulse-green { border-color: var(--green) !important; box-shadow: 0 0 30px rgba(0, 255, 136, 0.2); animation: breathe 3s infinite; }
        .pulse-red { border-color: var(--red) !important; box-shadow: 0 0 30px rgba(255, 77, 77, 0.3); animation: strobe 0.8s infinite; }
        .border-orange { border-color: var(--orange) !important; box-shadow: 0 0 20px rgba(255, 152, 0, 0.2); }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.1); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
        }

        @keyframes strobe {
            0%, 100% { opacity: 1; }
            50% { border-color: transparent; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="friction-overlay">
    <div class="guard-card" id="mainCard">
        <h2>How did you enter?</h2>
        <div class="sub-text">This label defines your performance metrics for the next 1,000 trades. Be precise.</div>

        <div class="btn-stack">
            <button class="guard-btn strength" onmouseover="applyState('ready')" onmouseout="resetState()">Trade Came to Me</button>
            <button class="guard-btn feel" onmouseover="applyState('caution')" onmouseout="resetState()">Intuition / Mkt Feel</button>
            <button class="guard-btn eager" onmouseover="applyState('gamble')" onmouseout="resetState()">Eager / FOMO</button>
        </div>

        <div class="consequence-box" id="cBox">
            <div id="consequence-msg">Identify your mental state to unlock the journal.</div>
        </div>
    </div>
</div>

<script>
    const card = document.getElementById('mainCard');
    const box = document.getElementById('cBox');
    const msg = document.getElementById('consequence-msg');

    function applyState(type) {
        resetState();
        if (type === 'ready') {
            card.classList.add('pulse-green');
            msg.innerText = "PROFESSIONAL: You traded your edge. This behavior leads to long-term profitability.";
            msg.style.color = "var(--green)";
        } else if (type === 'caution') {
            card.classList.add('border-orange');
            msg.innerText = "CONTEXTUAL: You are trading 'feel.' Ensure risk is tight and the technical stop is clear.";
            msg.style.color = "var(--orange)";
        } else if (type === 'gamble') {
            card.classList.add('pulse-red');
            msg.innerText = "GAMBLE: You are chasing. This entry is a direct threat to your $10k account's survival.";
            msg.style.color = "var(--red)";
        }
    }

    function resetState() {
        card.className = 'guard-card';
        msg.innerText = "Identify your mental state to unlock the journal.";
        msg.style.color = "#555";
    }
</script>

</body>
</html>
